<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#2C1E0F"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Autotransportes Alanís — Operador</title>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="manifest" href="manifest.json"/>
</head>
<body>
<header class="app-header">
  <div class="header-logo"><img src="img/logo.webp" alt="Logo"/></div>
  <div class="header-text">
    <h1>AUTOTRANSPORTES ALANÍS</h1>
    <p id="header-sub">Cargando...</p>
  </div>
  <div class="header-actions">
    <button class="btn-icon" onclick="toggleDark()" title="Modo oscuro">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button class="btn-icon" onclick="doLogout()" title="Salir">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</header>
<div class="page-content" id="tab-reporte">
  <div class="date-chip">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span id="fecha-hoy"></span>
  </div>
  <div id="ya-reportado" class="alert alert-success hidden">✅ Ya enviaste tu reporte de disponibilidad hoy.</div>
  <p class="section-label">Selecciona tu estatus del día</p>
  <div id="status-list"></div>
  <button class="btn-primary mt-12" id="btn-reporte" onclick="enviarReporte()">Enviar reporte de disponibilidad</button>
</div>
<div class="page-content hidden" id="tab-ot">
  <div class="card mb-12">
    <div class="card-title">Nueva orden de trabajo</div>
    <div class="form-group">
      <label>Número económico de la unidad</label>
      <input type="text" id="ot-unidad" placeholder="Ej: T-142"/>
    </div>
  </div>
  <div id="selected-tags-box" class="selected-tags-box hidden">
    <div class="selected-tags-title">Fallas seleccionadas — toca para quitar</div>
    <div class="tags-wrap" id="selected-tags"></div>
  </div>
  <div class="row-between">
    <p class="section-label" style="margin-bottom:0">Catálogo de fallas</p>
    <span class="text-muted">Sel: <strong id="falla-count" style="color:var(--brand-light)">0</strong></span>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" type="text" id="search-falla" placeholder="Buscar falla..." oninput="renderFallas()"/>
  </div>
  <div id="falla-list"></div>
  <button class="btn-primary mt-8" id="btn-ot" onclick="enviarOT()">Crear orden de trabajo</button>
  <p class="section-label mt-16">Mis órdenes de trabajo</p>
  <div id="mis-ots"></div>
</div>
<div class="page-content hidden" id="tab-historial">
  <p class="section-label">Mis reportes recientes</p>
  <div id="historial-list"></div>
</div>
<nav class="bottom-nav">
  <button class="nav-item active" id="nav-reporte" onclick="switchTab('reporte')">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    Reporte
  </button>
  <button class="nav-item" id="nav-ot" onclick="switchTab('ot')">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
    Orden de trabajo
    <span class="nav-badge hidden" id="ot-badge">0</span>
  </button>
  <button class="nav-item" id="nav-historial" onclick="switchTab('historial')">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Historial
  </button>
</nav>
<div class="toast" id="toast">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
  <span id="toast-msg"></span>
</div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="js/data.js"></script>
<script src="js/operador.js"></script>
</body>
</html>
