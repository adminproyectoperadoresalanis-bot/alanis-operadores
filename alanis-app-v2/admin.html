<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#2C1E0F"/>
  <title>Autotransportes Alanís — Admin</title>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="manifest" href="manifest.json"/>
</head>
<body>

<header class="app-header">
  <div class="header-logo">
    <img src="img/logo.webp" alt="Logo"/>
  </div>
  <div class="header-text">
    <h1>AUTOTRANSPORTES ALANÍS</h1>
    <p>Panel de administración</p>
  </div>
  <div class="header-actions">
    <button class="btn-icon" onclick="toggleDark()" title="Modo oscuro">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button class="btn-icon" onclick="exportarExcel()" title="Exportar">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
    <button class="btn-icon" onclick="doLogout()" title="Salir">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</header>

<!-- CONTENIDO DASHBOARD -->
<div class="page-content" id="tab-dashboard">
  <div class="stat-grid" id="stat-grid">
    <div class="stat-card"><div class="stat-num" id="cnt-disponible" style="color:#639922">—</div><div class="stat-lbl">Disponibles</div></div>
    <div class="stat-card"><div class="stat-num" id="cnt-incidencia" style="color:#BA7517">—</div><div class="stat-lbl">Incidencias</div></div>
    <div class="stat-card"><div class="stat-num" id="cnt-sinreporte" style="color:#E24B4A">—</div><div class="stat-lbl">Sin reporte</div></div>
    <div class="stat-card"><div class="stat-num" id="cnt-total"      style="color:#8B6B45">—</div><div class="stat-lbl">Total operadores</div></div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="filterReportes('todos',this)">Todos</button>
    <button class="tab-btn" onclick="filterReportes('disponible',this)">Disponibles</button>
    <button class="tab-btn" onclick="filterReportes('incidencia',this)">Incidencias</button>
    <button class="tab-btn" onclick="filterReportes('sin_reporte',this)">Sin reporte</button>
  </div>

  <p class="section-label">Reportes de hoy — <span id="fecha-admin"></span></p>
  <div id="reportes-list"></div>
</div>

<!-- CONTENIDO OTs -->
<div class="page-content hidden" id="tab-ots">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="filterOTs('todos',this)">Todas</button>
    <button class="tab-btn" onclick="filterOTs('pendiente',this)">Pendientes</button>
    <button class="tab-btn" onclick="filterOTs('en_proceso',this)">En proceso</button>
    <button class="tab-btn" onclick="filterOTs('resuelto',this)">Resueltas</button>
  </div>
  <p class="section-label">Órdenes de trabajo</p>
  <div id="ots-list"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item active" id="nav-dashboard" onclick="switchTab('dashboard')">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    Dashboard
  </button>
  <button class="nav-item" id="nav-ots" onclick="switchTab('ots')">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
    Órdenes de trabajo
    <span class="nav-badge hidden" id="ots-badge">0</span>
  </button>
</nav>

<!-- TOAST -->
<div class="toast" id="toast">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
  <span id="toast-msg"></span>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="js/data.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
