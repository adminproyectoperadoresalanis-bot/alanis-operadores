<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#2C1E0F"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Autotransportes Alanís</title>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="manifest" href="manifest.json"/>
  <style>
    /* Estilos específicos del login Google */
    .login-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px 20px;
      background: var(--bg-app);
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--bg-card);
      border-radius: 24px;
      border: 0.5px solid var(--border);
      padding: 36px 28px 28px;
      box-shadow: 0 4px 24px rgba(44,30,15,0.10);
      text-align: center;
    }
    .login-logo-wrap {
      width: 108px; height: 108px;
      background: #fff;
      border-radius: 22px;
      border: 0.5px solid var(--border-strong);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      padding: 12px;
      box-shadow: 0 2px 10px rgba(44,30,15,0.08);
    }
    .login-logo-wrap img { width: 84px; height: 84px; object-fit: contain; }
    .login-company {
      font-size: 17px; font-weight: 700;
      color: var(--text-primary); letter-spacing: 0.3px;
      margin-bottom: 6px;
    }
    .login-sub {
      font-size: 13px; color: var(--text-muted);
      margin-bottom: 32px; line-height: 1.5;
    }

    /* Botón de Google */
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 13px 20px;
      background: #fff; color: #1A1208;
      border: 1.5px solid var(--border-strong);
      border-radius: 12px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.15s, box-shadow 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .btn-google:hover {
      background: #f8f4f0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .btn-google:active { background: #f0ebe4; }
    .btn-google:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-google svg { flex-shrink: 0; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--text-muted); font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 0.5px; background: var(--border-strong);
    }

    .login-info {
      background: var(--brand-pale);
      border-radius: 10px; padding: 12px 14px;
      font-size: 12px; color: var(--text-secondary);
      text-align: left; line-height: 1.6;
      border: 0.5px solid var(--border);
    }
    .dark-mode .login-info { background: #3D2B15; }
    .login-info strong { color: var(--text-primary); }

    .login-footer {
      margin-top: 20px;
      font-size: 11px; color: var(--text-muted);
    }

    /* Error */
    .login-error {
      background: #FCEBEB; color: #791F1F;
      border: 0.5px solid #E24B4A;
      border-radius: 10px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 16px;
      display: none; text-align: left;
    }

    /* Spinner overlay */
    .loading-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 999;
      background: rgba(44,30,15,0.35);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
    }
    .loading-overlay.show { display: flex; }
    .loading-box {
      background: var(--bg-card); border-radius: 16px;
      padding: 28px 36px; text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }
    .spinner-lg {
      width: 36px; height: 36px;
      border: 3px solid var(--border-strong);
      border-top-color: var(--brand-light);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    .loading-box p { font-size: 14px; color: var(--text-secondary); }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div class="loading-overlay" id="loading">
  <div class="loading-box">
    <div class="spinner-lg"></div>
    <p>Verificando acceso...</p>
  </div>
</div>

<div class="login-wrap">
  <div class="login-card">

    <div class="login-logo-wrap">
      <img src="img/logo.webp" alt="Logo Autotransportes Alanís"/>
    </div>

    <h1 class="login-company">AUTOTRANSPORTES ALANÍS</h1>
    <p class="login-sub">Sistema de control de operadores</p>

    <div class="login-error" id="login-error"></div>

    <button class="btn-google" id="btn-google" onclick="loginGoogle()">
      <!-- Ícono oficial de Google -->
      <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Entrar con Google
    </button>

    <div class="divider">acceso autorizado únicamente</div>

    <div class="login-info">
      <strong>⚠️ Solo para personal autorizado</strong><br/>
      Debes iniciar sesión con el correo Gmail registrado por tu empresa.
      Si tienes problemas, contacta a tu supervisor.
    </div>

  </div>
  <div class="login-footer">© 2025 Autotransportes Alanís</div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
